name: CI

# Drift guard: the rule lives in rule/compass.md and is embedded into the
# generated transport copies (src/ + remote/lib/) by scripts/embed.mjs.
# `npm test` runs check-sync (fails if a copy is stale, i.e. someone edited
# the rule without re-running `npm run embed`), then build + smoke. This makes
# silent rule-drift impossible to merge.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm test
